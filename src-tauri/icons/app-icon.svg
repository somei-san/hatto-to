<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 背景（角丸） -->
  <rect x="60" y="60" width="904" height="904" rx="180" ry="180" fill="#FFD600"/>

  <!-- 付箋の折り返し -->
  <path d="M 670 60 L 964 60 Q 964 60 964 240 Z" fill="#E6BF00"/>

  <!-- くまピクトグラム（単色・太線・凶暴） -->
  <g fill="none" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round">

    <!-- 耳 -->
    <circle cx="310" cy="310" r="70" fill="#1A1A1A"/>
    <circle cx="690" cy="310" r="70" fill="#1A1A1A"/>

    <!-- 頭 -->
    <circle cx="500" cy="440" r="200" fill="#1A1A1A"/>

    <!-- マズル -->
    <ellipse cx="500" cy="505" rx="90" ry="70" fill="#FFD600"/>

    <!-- 目（鋭い三角・怒り） -->
    <polygon points="370,390 430,410 380,430" fill="#FFD600"/>
    <polygon points="630,390 570,410 620,430" fill="#FFD600"/>

    <!-- 鼻 -->
    <polygon points="500,475 480,500 520,500" fill="#1A1A1A"/>

    <!-- 口（威嚇・V字） -->
    <path d="M 440,530 L 500,555 L 560,530" stroke="#1A1A1A" stroke-width="8" fill="none"/>

    <!-- 牙 -->
    <line x1="460" y1="530" x2="455" y2="560" stroke="#FFD600" stroke-width="10"/>
    <line x1="540" y1="530" x2="545" y2="560" stroke="#FFD600" stroke-width="10"/>

    <!-- 体 -->
    <path d="M 340,620 Q 500,600 660,620 L 700,820 Q 500,850 300,820 Z" fill="#1A1A1A" stroke="none"/>

    <!-- 爪（左） -->
    <g stroke="#FFD600" stroke-width="8">
      <line x1="220" y1="760" x2="190" y2="720"/>
      <line x1="245" y1="750" x2="218" y2="708"/>
      <line x1="270" y1="745" x2="248" y2="700"/>
    </g>
    <!-- 左腕 -->
    <path d="M 340,660 Q 260,700 240,770" stroke="#1A1A1A" stroke-width="60" fill="none"/>

    <!-- 爪（右） -->
    <g stroke="#FFD600" stroke-width="8">
      <line x1="780" y1="760" x2="810" y2="720"/>
      <line x1="755" y1="750" x2="782" y2="708"/>
      <line x1="730" y1="745" x2="752" y2="700"/>
    </g>
    <!-- 右腕 -->
    <path d="M 660,660 Q 740,700 760,770" stroke="#1A1A1A" stroke-width="60" fill="none"/>
  </g>
</svg>
